services:
  critic:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PROMPTS_REPO_URL=${PROMPTS_REPO_URL}
      - PROMPTS_REPO_PATH=${PROMPTS_REPO_PATH:-prompts/}
      - PROMPTS_BRANCH=${PROMPTS_BRANCH:-main}
    env_file:
      - .env
    restart: unless-stopped
